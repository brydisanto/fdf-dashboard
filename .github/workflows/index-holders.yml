name: Index NFL Holders

# Hourly cron + manual trigger. Persists snapshots to a `data` branch
# so the deployed app can fetch them via raw.githubusercontent.com
# without paying for any storage. Deployed app does NOT redeploy when
# the data branch updates (Vercel only watches main).

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: index-holders
  cancel-in-progress: false

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out data branch (or initialize from main)
        uses: actions/checkout@v4
        with:
          ref: data
          fetch-depth: 1
        continue-on-error: true

      - name: Initialize data branch if missing
        run: |
          if [ ! -d ".git" ]; then
            echo "data branch not present yet — bootstrapping from main"
            git init
            git remote add origin "https://github.com/${{ github.repository }}.git"
            git fetch origin main --depth=1
            git checkout -b data
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run indexer
        run: node scripts/index-holders.mjs --write

      - name: Commit snapshot to data branch
        run: |
          git config user.name "Gridiron Indexer"
          git config user.email "indexer@users.noreply.github.com"
          git add data/unique-holders.json
          if git diff --staged --quiet; then
            echo "No change in snapshot."
            exit 0
          fi
          git commit -m "Hourly snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
