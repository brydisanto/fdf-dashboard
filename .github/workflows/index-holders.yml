name: Index NFL Holders

# Hourly cron + manual trigger. Persists snapshots to a `data` branch
# so the deployed app can fetch them via raw.githubusercontent.com
# without paying for any storage. The deployed app does NOT redeploy
# when the data branch updates (Vercel only watches main).

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: index-holders
  cancel-in-progress: false

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Try to check out the existing `data` branch first (so we get the
      # accumulated history). If it doesn't exist or is empty, we'll
      # bootstrap from main below.
      - uses: actions/checkout@v4
        with:
          ref: data
          fetch-depth: 0
        continue-on-error: true

      - name: Bootstrap from main if data branch missing or empty
        shell: bash
        run: |
          set -e
          if [ ! -f "scripts/index-holders.mjs" ]; then
            echo "data branch missing the script — bootstrapping from main"
            git init -b data
            git remote remove origin 2>/dev/null || true
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git fetch origin main
            git reset --hard origin/main
          fi

      - name: Sync latest scripts from main into the data branch
        shell: bash
        run: |
          git fetch origin main
          # Merge main's scripts/workflow updates without disturbing
          # data/ — `theirs` strategy means main wins on conflicts.
          git merge origin/main --no-edit -X theirs --allow-unrelated-histories || true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run indexer
        run: node scripts/index-holders.mjs --write

      - name: Commit snapshot to data branch
        shell: bash
        run: |
          set -e
          git config user.name "Gridiron Indexer"
          git config user.email "indexer@users.noreply.github.com"
          git add data/unique-holders.json
          if git diff --staged --quiet; then
            echo "No change in snapshot."
            exit 0
          fi
          git commit -m "Hourly snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Rebase-and-retry the push. The other three indexers
          # (trades / top-wallets / prices) also write to the data
          # branch every 5–15 min, so during this job's 15-minute
          # runtime several of their commits typically land — the
          # naive `git push` then fails with "fetch first". Because
          # each indexer commits a different file, the rebase is
          # always conflict-free.
          attempt=0
          max=6
          until git push origin HEAD:data; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max ]; then
              echo "Push still failing after $max attempts — giving up."
              exit 1
            fi
            echo "Push rejected (attempt $attempt) — fetching and rebasing onto origin/data"
            git fetch origin data
            if ! git rebase origin/data; then
              echo "Rebase produced conflicts — aborting and bailing out."
              git rebase --abort || true
              exit 1
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
