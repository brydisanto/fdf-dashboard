name: Index NFL Trades

# Every 5 minutes + manual trigger. Phase 2 of the on-chain migration:
# scans ERC-1155 TransferSingle events from the FOOTBALLFUN_CONTRACT,
# derives USD amounts from per-tx USDC transfers, and commits the
# trade history to the `data` branch. The deployed app reads it via
# raw.githubusercontent.com — fully independent of Tenero's /trades
# endpoints.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      rescan_blocks:
        description: "Re-scan the most recent N blocks (leave blank for normal incremental run). Used to backfill gaps from past RPC truncation — existing trades are deduped by (txId, logIndex) so this is safe."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: index-trades
  cancel-in-progress: false

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data
          fetch-depth: 0
        continue-on-error: true

      - name: Configure git identity
        shell: bash
        run: |
          git config --global user.name "Gridiron Indexer"
          git config --global user.email "indexer@users.noreply.github.com"

      - name: Bootstrap data branch if missing, then overlay main scripts
        shell: bash
        run: |
          set -e
          if [ ! -f "scripts/index-trades.mjs" ]; then
            echo "data branch missing the script — bootstrapping"
            git init -b data
            git remote remove origin 2>/dev/null || true
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git fetch origin main
            git fetch origin data 2>/dev/null || true
            if git show-ref --verify --quiet refs/remotes/origin/data; then
              git reset --hard origin/data
              git checkout origin/main -- scripts/ .github/workflows/ 2>/dev/null || true
              git add -A
              if ! git diff --staged --quiet; then
                git commit -m "Sync scripts from main"
              fi
            else
              git reset --hard origin/main
            fi
          fi

      - name: Sync latest scripts from main into the data branch
        shell: bash
        run: |
          git fetch origin main
          git merge origin/main --no-edit -X theirs --allow-unrelated-histories || true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run indexer
        env:
          GRIDIRON_RESCAN_BLOCKS: ${{ github.event.inputs.rescan_blocks }}
        run: node scripts/index-trades.mjs --write

      - name: Commit snapshot to data branch
        shell: bash
        run: |
          set -e
          git add data/trade-history.json
          if git diff --staged --quiet; then
            echo "No new trades."
            exit 0
          fi
          git commit -m "Trade index $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Race-safe push. The four indexers all push to `data` and
          # each commits a different file, so a conflict means
          # someone else landed first — fetch, rebase, retry.
          attempt=0
          max=6
          until git push origin HEAD:data; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max ]; then
              echo "Push still failing after $max attempts — giving up."
              exit 1
            fi
            echo "Push rejected (attempt $attempt) — rebasing onto origin/data"
            git fetch origin data
            if ! git rebase origin/data; then
              git rebase --abort || true
              exit 1
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
